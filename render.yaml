# render.yaml
# Render "Blueprint" — defines the backend web service + PostgreSQL database.
# Connect your GitHub repo in Render and it will read this file automatically.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: awsdash-api
    runtime: node
    region: singapore        # change to: oregon, frankfurt, ohio, virginia as needed
    plan: free               # free tier — spins down after 15 min inactivity (first req is slow)
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      # Render injects DATABASE_URL automatically from the linked database below
      - key: DATABASE_URL
        fromDatabase:
          name: awsdash-db
          property: connectionString

      # Set these manually in Render dashboard after first deploy:
      # Dashboard → awsdash-api → Environment
      - key: JWT_SECRET
        generateValue: true    # Render generates a secure random value automatically

      - key: NODE_ENV
        value: production

      - key: FRONTEND_URL
        sync: false            # Set manually: https://YOUR_USERNAME.github.io

      - key: AWS_ACCESS_KEY_ID
        sync: false            # Set manually: your IAM Access Key ID

      - key: AWS_SECRET_ACCESS_KEY
        sync: false            # Set manually: your IAM Secret Access Key

      - key: AWS_REGION
        sync: false            # Set manually: e.g. ap-south-1

      - key: ADMIN_USERNAME
        sync: false            # Set manually: your chosen admin username

      - key: ADMIN_PASSWORD
        sync: false            # Set manually: strong password (min 10 chars)

      # Optional — for alert emails:
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: awsdash-db
    databaseName: awsdash
    user: awsdash
    plan: free                 # free PostgreSQL — 1GB storage, no expiry
    region: singapore          # must match service region above
