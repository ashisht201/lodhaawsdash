# .github/workflows/deploy-frontend.yml
# Builds the React frontend and deploys it to GitHub Pages on every push to main.
# The backend is deployed separately on Render (auto-deploys from the same repo).

name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group:            pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build
        env:
          # Set this secret in: repo Settings → Secrets → Actions
          # Value: your Render backend URL, e.g. https://awsdash-api.onrender.com/api
          VITE_API_URL:   ${{ secrets.VITE_API_URL }}
          # Set to /REPO_NAME (e.g. /awsdash) — must match your GitHub repo name
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH }}
        run: cd frontend && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id:   deployment
        uses: actions/deploy-pages@v4
